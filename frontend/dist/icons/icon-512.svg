<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <!-- NightPOS logo  three rotated pill shapes forming an "N" -->
  <g transform="translate(256 256)">
    <!-- Left pillar -->
    <rect x="-140" y="-118" width="64" height="188" rx="32"
          fill="#666CFF"
          transform="rotate(-30)"/>
    <!-- Right pillar -->
    <rect x="76" y="-118" width="64" height="188" rx="32"
          fill="#666CFF"
          transform="rotate(30)"/>
    <!-- Cross bar -->
    <rect x="-96" y="-22" width="192" height="52" rx="26"
          fill="#666CFF"
          transform="rotate(-15) skewX(30)"/>
  </g>
</svg>
