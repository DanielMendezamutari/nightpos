<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API - NightPOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .results {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #333;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            word-break: break-all;
        }
        
        .status-success {
            color: #4caf50;
        }
        
        .status-error {
            color: #f44336;
        }
        
        .status-pending {
            color: #ff9800;
        }
        
        .hidden {
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .endpoint-list {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #856404;
        }
        
        .endpoint-list strong {
            display: block;
            margin-bottom: 8px;
        }
        
        .endpoint-item {
            padding: 4px 0;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test API NightPOS</h1>
        <p class="subtitle">Verifica la disponibilidad de tu API</p>
        
        <div class="form-group">
            <label for="apiUrl">URL de la API</label>
            <input 
                type="text" 
                id="apiUrl" 
                placeholder="https://nightpos.ribersoft.com/api"
                value="https://nightpos.ribersoft.com/api"
            >
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="testAPI()">🚀 Probar API</button>
            <button class="btn-secondary" onclick="clearResults()">🗑️ Limpiar</button>
        </div>
        
        <div id="results" class="results hidden">
            <div class="result-item">
                <div class="result-label">Estado</div>
                <div class="result-value" id="statusResult"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Código HTTP</div>
                <div class="result-value" id="statusCodeResult"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Tiempo de Respuesta</div>
                <div class="result-value" id="responseTimeResult"></div>
            </div>
            <div class="result-item">
                <div class="result-label">Respuesta</div>
                <div class="result-value" id="responseDataResult" style="white-space: pre-wrap;"></div>
            </div>
        </div>
        
        <div class="endpoint-list">
            <strong>URLs comunes para probar:</strong>
            <div class="endpoint-item">✅ API Producción: https://nightpos.ribersoft.com/api</div>
            <div class="endpoint-item">🏠 API Local: http://nightpos.test/api</div>
        </div>
    </div>

    <script>
        async function testAPI() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            
            if (!apiUrl) {
                alert('Por favor ingresa una URL');
                return;
            }
            
            const testUrl = apiUrl.endsWith('/') ? apiUrl + 'health' : apiUrl + '/health';
            const btn = event.target;
            btn.disabled = true;
            btn.classList.add('btn-loading');
            btn.textContent = '⏳ Probando...';
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');
            
            const startTime = performance.now();
            
            try {
                const response = await fetch(testUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                const endTime = performance.now();
                const responseTime = (endTime - startTime).toFixed(2);
                
                const statusElement = document.getElementById('statusResult');
                const statusCodeElement = document.getElementById('statusCodeResult');
                const responseTimeElement = document.getElementById('responseTimeResult');
                const responseDataElement = document.getElementById('responseDataResult');
                
                if (response.ok) {
                    statusElement.innerHTML = '<span class="status-success">✅ API Disponible</span>';
                    statusElement.classList.add('status-success');
                } else {
                    statusElement.innerHTML = `<span class="status-error">❌ Error ${response.status}</span>`;
                    statusElement.classList.add('status-error');
                }
                
                statusCodeElement.textContent = `${response.status} ${response.statusText}`;
                responseTimeElement.textContent = `${responseTime}ms`;
                
                try {
                    const data = await response.json();
                    responseDataElement.textContent = JSON.stringify(data, null, 2);
                } catch {
                    responseDataElement.textContent = 'Respuesta recibida (no es JSON)';
                }
                
            } catch (error) {
                const statusElement = document.getElementById('statusResult');
                statusElement.innerHTML = `<span class="status-error">❌ ${error.message}</span>`;
                statusElement.classList.add('status-error');
                document.getElementById('statusCodeResult').textContent = 'Error de Conexión';
                document.getElementById('responseTimeResult').textContent = 'N/A';
                document.getElementById('responseDataResult').textContent = `Error: ${error.message}\n\nPosibles causas:\n- Servidor no disponible\n- URL incorrecta\n- Problemas de CORS\n- Sin conexión a internet`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('btn-loading');
                btn.textContent = '🚀 Probar API';
            }
        }
        
        function clearResults() {
            document.getElementById('results').classList.add('hidden');
            document.getElementById('apiUrl').value = 'https://nightpos.ribersoft.com/api';
        }
        
        // Permitir Enter en el input
        document.getElementById('apiUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI.call({target: document.querySelector('.btn-primary')});
            }
        });
    </script>
</body>
</html>
